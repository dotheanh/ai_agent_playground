<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody Tracker - Theo dõi sức khỏe</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        .card .unit {
            font-size: 0.4em;
            color: #888;
        }
        .card .change {
            font-size: 0.9em;
            margin-top: 10px;
        }
        .change.positive { color: #10b981; }
        .change.negative { color: #ef4444; }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .chart-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        tr:hover {
            background: #e9ecef;
        }
        .latest {
            background: #d1fae5 !important;
        }
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 0.8em;
            }
        }

        /* Report Cards Section */
        .reports-section {
            padding: 20px 0;
        }
        .reports-section h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .report-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .report-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        .report-card .date {
            color: white;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .report-card .highlights {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .report-card .highlight {
            text-align: center;
        }
        .report-card .highlight-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8em;
            margin-bottom: 5px;
        }
        .report-card .highlight-value {
            color: white;
            font-size: 1.3em;
            font-weight: bold;
        }
        .report-card .score {
            color: #ffd700;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.95));
            border-radius: 20px;
            max-width: 1200px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 20px 20px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }
        .modal-header .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .modal-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.8em;
        }
        .modal-header .sub-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            font-size: 1.1em;
        }
        .modal-header .metric {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-header .metric-label {
            opacity: 0.8;
            font-size: 0.9em;
        }
        .modal-header .metric-value {
            font-weight: bold;
            font-size: 1.3em;
        }
        .modal-header .metric-value.score {
            color: #ffd700;
        }
        .modal-body {
            padding: 30px;
        }
        .modal-columns {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .modal-column {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .modal-column h4 {
            color: #667eea;
            margin: 0 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .modal-row:last-child {
            border-bottom: none;
        }
        .modal-row .label {
            color: #666;
            font-size: 0.85em;
        }
        .modal-row .value {
            color: #333;
            font-weight: 600;
            font-size: 0.9em;
        }

        @media (max-width: 1400px) {
            .modal-columns {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 1000px) {
            .modal-columns {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💪 InBody Tracker</h1>

        <div class="dashboard" id="dashboard"></div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📊 Cân nặng & BMI</h3>
                <canvas id="weightChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>🔥 Tỷ lệ mỡ & Cơ</h3>
                <canvas id="bodyCompChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>⭐ Điểm InBody</h3>
                <canvas id="scoreChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>💧 Nước cơ thể</h3>
                <canvas id="waterChart"></canvas>
            </div>
        </div>

        <div class="reports-section">
            <h3>📊 Danh sách báo cáo</h3>
            <div class="reports-grid" id="reportsGrid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <h2 id="modalTitle">Báo cáo InBody</h2>
                <div class="sub-header" id="modalSubHeader"></div>
            </div>
            <div class="modal-body">
                <div class="modal-columns" id="modalColumns"></div>
            </div>
        </div>
    </div>

    <script>
        // Load data from JSON file (generated by parse_csv.py)
        async function loadJSON() {
            try {
                const response = await fetch('data/data.json');
                if (!response.ok) throw new Error('JSON not found');
                const json = await response.json();
                return json.data || [];
            } catch (e) {
                console.error('Failed to load JSON:', e);
                return [];
            }
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr === '-') return '-';
            const y = dateStr.slice(0, 4);
            const m = dateStr.slice(4, 6);
            const d = dateStr.slice(6, 8);
            return d + '/' + m + '/' + y;
        }

        function calculateChange(current, previous) {
            if (current === '-' || previous === '-') return null;
            const diff = parseFloat(current) - parseFloat(previous);
            return diff.toFixed(1);
        }

        function renderDashboard(rows) {
            if (rows.length === 0) return;
            const latest = rows[0];
            const previous = rows[1] || {};

            const metrics = [
                { key: 'Cân nặng(kg)', label: 'Cân nặng', unit: 'kg', better: 'lower' },
                { key: 'BMI(kg/m²)', label: 'BMI', unit: '', better: 'lower' },
                { key: 'Tỷ lệ mỡ cơ thể(%)', label: '% Mỡ', unit: '%', better: 'lower' },
                { key: 'Khối lượng cơ xương(kg)', label: 'Cơ xương', unit: 'kg', better: 'higher' },
                { key: 'Điểm InBody', label: 'Điểm InBody', unit: '', better: 'higher' },
                { key: 'Tỷ lệ trao đổi chất cơ bản(kcal)', label: 'BMR', unit: 'kcal', better: 'higher' },
                { key: 'Vòng eo(cm)', label: 'Vòng eo', unit: 'cm', better: 'lower' },
                { key: 'Lượng nước trong cơ thể(L)', label: 'Nước', unit: 'L', better: 'neutral' }
            ];

            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = metrics.map(function(m) {
                let current = latest[m.key] || '-';
                let prev = previous[m.key] || '-';
                const change = calculateChange(current, prev);
                let changeHtml = '';

                if (change !== null && change !== '0.0') {
                    const isPositive = parseFloat(change) > 0;
                    const isGood = m.better === 'higher' ? isPositive : !isPositive;
                    const cls = isGood ? 'positive' : 'negative';
                    const arrow = isPositive ? '↑' : '↓';
                    changeHtml = '<div class="change ' + cls + '">' + arrow + ' ' + Math.abs(change) + m.unit + '</div>';
                }

                return '<div class="card"><h3>' + m.label + '</h3><div class="value">' + current + '<span class="unit">' + m.unit + '</span></div>' + changeHtml + '</div>';
            }).join('');
        }

        function renderReportsGrid(rows) {
            const grid = document.getElementById('reportsGrid');

            grid.innerHTML = rows.map(function(row, idx) {
                const score = row['Điểm InBody'] || '-';
                const weight = row['Cân nặng(kg)'] || '-';
                const fat = row['Tỷ lệ mỡ cơ thể(%)'] || '-';
                const bmi = row['BMI(kg/m²)'] || '-';
                const date = formatDate(row['ngày']);

                return '<div class="report-card" onclick="openModal(' + idx + ')">' +
                    '<div class="date">📅 ' + date + '</div>' +
                    '<div class="highlights">' +
                        '<div class="highlight">' +
                            '<div class="highlight-label">Điểm InBody</div>' +
                            '<div class="highlight-value score">' + score + '</div>' +
                        '</div>' +
                        '<div class="highlight">' +
                            '<div class="highlight-label">Cân nặng</div>' +
                            '<div class="highlight-value">' + weight + ' kg</div>' +
                        '</div>' +
                        '<div class="highlight">' +
                            '<div class="highlight-label">% Mỡ</div>' +
                            '<div class="highlight-value">' + fat + '</div>' +
                        '</div>' +
                        '<div class="highlight">' +
                            '<div class="highlight-label">BMI</div>' +
                            '<div class="highlight-value">' + bmi + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function renderTable(rows) {
            const displayKeys = [
                { raw: 'ngày', display: 'Ngày' },
                { raw: 'Cân nặng(kg)', display: 'Cân nặng' },
                { raw: 'Khối lượng cơ xương(kg)', display: 'Cơ xương' },
                { raw: 'Khối lượng mỡ trong cơ thể(kg)', display: 'Mỡ' },
                { raw: 'BMI(kg/m²)', display: 'BMI' },
                { raw: 'Tỷ lệ mỡ cơ thể(%)', display: '% Mỡ' },
                { raw: 'Điểm InBody', display: 'Điểm' },
                { raw: 'Vòng eo(cm)', display: 'Vòng eo' },
                { raw: 'Lượng nước trong cơ thể(L)', display: 'Nước' }
            ];

            let thead = '<tr>';
            displayKeys.forEach(function(k) {
                thead += '<th>' + k.display + '</th>';
            });
            thead += '</tr>';

            let tbody = '';
            rows.forEach(function(row, idx) {
                tbody += '<tr class="' + (idx === 0 ? 'latest' : '') + '">';
                displayKeys.forEach(function(k) {
                    const val = row[k.raw] || '-';
                    if (k.raw === 'ngày') {
                        tbody += '<td>' + formatDate(val) + '</td>';
                    } else {
                        tbody += '<td>' + val + '</td>';
                    }
                });
                tbody += '</tr>';
            });

            document.getElementById('dataTable').innerHTML = thead + tbody;
        }

        function renderCharts(rows) {
            const getVal = function(r, key) {
                const val = r[key];
                return val === '-' ? null : parseFloat(val);
            };

            const getDay = function(r) {
                return formatDate(r['ngày']);
            };

            const labels = rows.map(function(r) { return getDay(r); });

            new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Cân nặng (kg)',
                            data: rows.map(function(r) { return getVal(r, 'Cân nặng(kg)'); }),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4
                        },
                        {
                            label: 'BMI',
                            data: rows.map(function(r) { return getVal(r, 'BMI(kg/m²)'); }),
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: false },
                        y1: { position: 'right', beginAtZero: false, grid: { drawOnChartArea: false } }
                    }
                }
            });

            new Chart(document.getElementById('bodyCompChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '% Mỡ',
                            data: rows.map(function(r) { return getVal(r, 'Tỷ lệ mỡ cơ thể(%)'); }),
                            backgroundColor: '#ef4444'
                        },
                        {
                            label: 'Cơ xương (kg)',
                            data: rows.map(function(r) { return getVal(r, 'Khối lượng cơ xương(kg)'); }),
                            backgroundColor: '#10b981',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true },
                        y1: { position: 'right', beginAtZero: false, grid: { drawOnChartArea: false } }
                    }
                }
            });

            new Chart(document.getElementById('scoreChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Điểm InBody',
                        data: rows.map(function(r) { return getVal(r, 'Điểm InBody'); }),
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true }
            });

            new Chart(document.getElementById('waterChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Lượng nước (L)',
                        data: rows.map(function(r) { return getVal(r, 'Lượng nước trong cơ thể(L)'); }),
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: { responsive: true }
            });
        }

        // Modal Functions
        function openModal(rowIndex) {
            const rows = window.currentRows || [];
            const row = rows[rowIndex];
            if (!row) return;

            const date = formatDate(row['ngày']);
            const score = row['Điểm InBody'] || '-';
            const weight = row['Cân nặng(kg)'] || '-';
            const bmi = row['BMI(kg/m²)'] || '-';
            const fat = row['Tỷ lệ mỡ cơ thể(%)'] || '-';
            const muscle = row['Khối lượng cơ xương(kg)'] || '-';
            const bmr = row['Tỷ lệ trao đổi chất cơ bản(kcal)'] || '-';
            const waist = row['Vòng eo(cm)'] || '-';
            const visceral = row['Mức độ chất béo nội tạng(Level)'] || '-';
            const water = row['Lượng nước trong cơ thể(L)'] || '-';
            const intracellular = row['Nước nội bào(L)'] || '-';
            const extracellular = row['Nước ngoại bào(L)'] || '-';
            const ecwRatio = row['Tỷ lệ ECW'] || '-';

            const armRightMuscle = row['Khối lượng cơ ở cánh tay phải(kg)'] || '-';
            const armRightFat = row['Mỡ ở cánh tay phải(kg)'] || '-';
            const armLeftMuscle = row['Khối lượng cơ ở cánh tay trái(kg)'] || '-';
            const armLeftFat = row['Mỡ ở cánh tay trái(kg)'] || '-';
            const torsoMuscle = row['Khối lượng cơ ở thân mình(kg)'] || '-';
            const torsoFat = row['Mỡ ở thân mình(kg)'] || '-';
            const legRightMuscle = row['Khối lượng cơ ở chân phải(kg)'] || '-';
            const legRightFat = row['Khối lượng mỡ ở chân phải(kg)'] || '-';
            const legLeftMuscle = row['Khối lượng cơ ở chân trái(kg)'] || '-';
            const legLeftFat = row['Khối lượng mỡ ở chân trái(kg)'] || '-';

            const ecwRightArm = row['Cánh tay phải Tỷ lệ ECW'] || '-';
            const ecwLeftArm = row['Cánh tay trái Tỷ lệ ECW'] || '-';
            const ecwTorso = row['Thân hình Tỷ lệ ECW'] || '-';
            const ecwRightLeg = row['Chân phải Tỷ lệ ECW'] || '-';
            const ecwLeftLeg = row['Chân trái Tỷ lệ ECW'] || '-';

            const upperLower = row['Trên-Dưới'] || '-';
            const upper = row['Phần trên'] || '-';
            const lower = row['Phần dưới'] || '-';
            const legLevel = row['Mức độ cơ chân(Level)'] || '-';
            const calfMuscle = row['Khối lượng cơ bắp chân(kg)'] || '-';
            const protein = row['Protein(kg)'] || '-';
            const mineral = row['Khoáng chất(kg)'] || '-';
            const boneMineral = row['Hàm lượng khoáng trong xương(kg)'] || '-';
            const cellMass = row['Khối lượng tế bào cơ thể(kg)'] || '-';
            const sbm = row['Chỉ số khối cơ xương(kg/m²)'] || '-';
            const phaseAngle = row['Góc pha toàn bộ cơ thể(°)'] || '-';

            // Modal Header
            document.getElementById('modalTitle').textContent = '📊 Báo cáo InBody';
            document.getElementById('modalSubHeader').innerHTML =
                '<div class="metric"><span class="metric-label">Ngày đo</span><span class="metric-value">' + date + '</span></div>' +
                '<div class="metric"><span class="metric-label">Điểm InBody</span><span class="metric-value score">' + score + '</span></div>' +
                '<div class="metric"><span class="metric-label">Cân nặng</span><span class="metric-value">' + weight + ' kg</span></div>' +
                '<div class="metric"><span class="metric-label">BMI</span><span class="metric-value">' + bmi + '</span></div>';

            // Modal Columns
            const columns = document.getElementById('modalColumns');

            columns.innerHTML =
                // Column 1: Body Composition
                '<div class="modal-column"><h4>Tổng quan</h4>' +
                    '<div class="modal-row"><span class="label">Tỷ lệ mỡ cơ thể</span><span class="value">' + fat + '</span></div>' +
                    '<div class="modal-row"><span class="label">Khối lượng cơ xương</span><span class="value">' + muscle + '</span></div>' +
                    '<div class="modal-row"><span class="label">BMR</span><span class="value">' + bmr + '</span></div>' +
                    '<div class="modal-row"><span class="label">Vòng eo</span><span class="value">' + waist + '</span></div>' +
                    '<div class="modal-row"><span class="label">Mỡ nội tạng</span><span class="value">' + visceral + '</span></div>' +
                    '<div class="modal-row"><span class="label">Lượng nước</span><span class="value">' + water + '</span></div>' +

        });

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {

            }
        });

        async function init() {

            window.currentRows = rows;

            if (rows.length === 0) {
                document.body.innerHTML += '<div style="text-align:center;color:white;margin-top:50px;"><h2>⚠️ Không tìm thấy file JSON</h2><p>Vui lòng chạy lệnh trước khi mở web:</p><code style="background:#fff3;padding:10px;border-radius:8px;margin-top:20px;display:inline-block;">python parse_csv.py</code></div>';
                return;
            }

            renderDashboard(rows);
