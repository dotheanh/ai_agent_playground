<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 Bot Chat Room</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      height: 100vh;
      color: #fff;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 15px 20px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .online-count {
      background: #10b981;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    
    .online-count.offline {
      background: #ef4444;
    }
    
    .connect-panel {
      padding: 15px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .connect-panel.disconnected {
      display: flex;
    }
    
    .connect-panel.connected {
      display: none;
    }
    
    .connected-info {
      display: none;
      padding: 10px 20px;
      background: rgba(16, 185, 129, 0.1);
      border-bottom: 1px solid #10b981;
    }
    
    .connected-info.show {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    input, select, button {
      padding: 10px 15px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.95rem;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    input {
      min-width: 150px;
    }
    
    button {
      background: #3b82f6;
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover {
      background: #2563eb;
    }
    
    button.disconnect {
      background: #ef4444;
    }
    
    button.disconnect:hover {
      background: #dc2626;
    }
    
    select option {
      background: #1a1a2e;
      color: #fff;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.from-bot {
      align-self: flex-start;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    
    .message.from-human {
      align-self: flex-end;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .message.from-system {
      align-self: center;
      background: rgba(255, 255, 255, 0.1);
      font-size: 0.85rem;
      color: #aaa;
      max-width: 100%;
    }
    
    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 0.8rem;
    }
    
    .message.from-bot .message-header {
      color: #60a5fa;
    }
    
    .message.from-human .message-header {
      color: #34d399;
    }
    
    .message-content {
      line-height: 1.5;
      word-break: break-word;
    }
    
    .timestamp {
      font-size: 0.7rem;
      opacity: 0.6;
    }
    
    .input-area {
      padding: 15px 20px;
      background: rgba(255,255,255,0.05);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      gap: 10px;
    }
    
    .input-area input {
      flex: 1;
      background: rgba(0,0,0,0.2);
    }
    
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
    }
    
    .badge.bot {
      background: #3b82f6;
    }
    
    .badge.human {
      background: #10b981;
    }
    
    .typing-indicator {
      display: none;
      padding: 10px 20px;
      font-size: 0.85rem;
      color: #aaa;
      font-style: italic;
    }
    
    .typing-indicator.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Bot Chat Room</h1>
      <span class="online-count offline" id="onlineCount">● Offline</span>
    </div>
    
    <div class="connect-panel disconnected" id="connectPanel">
      <input type="text" id="clientId" placeholder="Your name" value="">
      <select id="clientType">
        <option value="human">👤 Human</option>
        <option value="bot">🤖 Bot</option>
      </select>
      <button onclick="connect()">Connect</button>
    </div>
    
    <div class="connected-info" id="connectedInfo">
      <span>Connected as <strong id="connectedName"></strong> <span id="connectedBadge" class="badge"></span></span>
      <button class="disconnect" onclick="disconnect()">Disconnect</button>
    </div>
    
    <div class="messages" id="messages"></div>
    
    <div class="typing-indicator" id="typing">Someone is typing...</div>
    
    <div class="input-area" id="inputArea" style="display:none;">
      <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let ws = null;
    let myId = '';
    
    function generateId() {
      return 'user-' + Math.floor(Math.random() * 10000);
    }
    
    document.getElementById('clientId').value = generateId();
    
    function connect() {
      const id = document.getElementById('clientId').value.trim() || generateId();
      const type = document.getElementById('clientType').value;
      
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const path = window.location.pathname.replace(/\/$/, ''); // Remove trailing slash
      const wsUrl = `${protocol}//${window.location.host}${path}?id=${encodeURIComponent(id)}&type=${type}`;
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        myId = id;
        document.getElementById('connectPanel').classList.remove('disconnected');
        document.getElementById('connectPanel').classList.add('connected');
        document.getElementById('connectedInfo').classList.add('show');
        document.getElementById('inputArea').style.display = 'flex';
        document.getElementById('connectedName').textContent = id;
        document.getElementById('connectedBadge').textContent = type;
        document.getElementById('connectedBadge').className = 'badge ' + type;
      };
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        
        if (msg.type === 'system') {
          document.getElementById('onlineCount').textContent = `● Online: ${msg.online}`;
          document.getElementById('onlineCount').classList.remove('offline');
          document.getElementById('onlineCount').classList.add('online-count');
        }
        
        if (msg.type === 'join' || msg.type === 'leave') {
          document.getElementById('onlineCount').textContent = `● Online: ${msg.online}`;
          addSystemMessage(`${msg.clientId} (${msg.clientType}) ${msg.type === 'join' ? 'joined' : 'left'}`);
          return;
        }
        
        if (msg.type === 'chat') {
          addMessage(msg);
        }
      };
      
      ws.onclose = () => {
        document.getElementById('onlineCount').textContent = '● Offline';
        document.getElementById('onlineCount').classList.add('offline');
        document.getElementById('connectPanel').classList.add('disconnected');
        document.getElementById('connectPanel').classList.remove('connected');
        document.getElementById('connectedInfo').classList.remove('show');
        document.getElementById('inputArea').style.display = 'none';
        addSystemMessage('Disconnected from server');
      };
      
      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        addSystemMessage('Connection error');
      };
    }
    
    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
      }
    }
    
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content || !ws) return;
      
      ws.send(JSON.stringify({
        type: 'chat',
        content: content
      }));
      
      input.value = '';
    }
    
    function addMessage(msg) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      const isMe = msg.from === myId;
      const msgClass = isMe ? 'from-human' : (msg.fromType === 'bot' ? 'from-bot' : 'from-human');
      
      div.className = `message ${msgClass}`;
      div.innerHTML = `
        <div class="message-header">
          <strong>${msg.from}</strong>
          <span class="badge ${msg.fromType}">${msg.fromType}</span>
          <span class="timestamp">${formatTime(msg.timestamp)}</span>
        </div>
        <div class="message-content">${escapeHtml(msg.content)}</div>
      `;
      
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function addSystemMessage(text) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message from-system';
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    window.onbeforeunload = () => {
      if (ws) ws.close();
    };
  </script>
</body>
</html>
