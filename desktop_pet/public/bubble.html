<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    #bubble {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background: #0d0d0d;
      border: 2px solid #cc0000;
      border-radius: 12px;
      padding: 8px 14px;
      max-width: 300px;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(200,0,0,0.5);
      animation: bubbleIn 0.25s ease-out;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .icon    { font-size: 16px; flex-shrink: 0; }
    .type {
      font-size: 9px;
      text-transform: uppercase;
      color: #cc0000;
      letter-spacing: 0.5px;
      font-weight: bold;
    }
    .message {
      font-size: 11px;
      color: #e0e0e0;
      line-height: 1.3;
      margin-bottom: 6px;
      word-break: break-word;
      overflow-wrap: break-word;
      max-width: 280px;
    }
    #focus-btn {
      width: 100%;
      background: #cc0000;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 10px;
      font-family: 'Segoe UI', sans-serif;
      padding: 4px 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    #focus-btn:hover { background: #ff2222; }
    /* Low priority bubble - no button, simpler style */
    #bubble.low-priority {
      border-color: #444;
      box-shadow: 0 2px 10px rgba(100,100,100,0.3);
      padding: 6px 12px;
    }
    #bubble.low-priority #focus-btn {
      display: none !important;
    }
    #bubble.low-priority .type {
      color: #fff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="bubble">
    <div class="header">
      <div class="icon" id="icon">ℹ️</div>
      <div class="type" id="type">Notification</div>
    </div>
    <div class="message" id="msg"></div>
    <button id="focus-btn">Focus</button>
  </div>
  <script>
    const ICONS = {
      permission_request: '🔐',
      ask_question:      '❓',
      session_start:     '🚀',
      session_end:       '👋',
      notification:      'ℹ️',
      task_completed:    '✅'
    };
    const TYPE_NAMES = {
      permission_request: 'Permission Required',
      ask_question:       'Question',
      session_start:      'Session Started',
      session_end:        'Session Ended',
      notification:       'Notification',
      task_completed:     'Task Completed'
    };

    function playChime() {
      try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.setValueAtTime(1320, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      } catch (e) { /* silent fail if audio blocked */ }
    }

    document.getElementById('focus-btn').addEventListener('click', function() {
      if (window.electronAPI) {
        window.electronAPI.focusTerminal();
        window.electronAPI.hideBubble();
      }
    });

    // Truncate long file paths: d:\Anh\IT\Projects\AlexPlayground\writer\src\ui\test.txt
    // → d:\...\writer\src\ui\test.txt
    function truncatePath(path, keepParts) {
      if (!path) return '';
      keepParts = keepParts || 3; // Keep last 3 parts by default

      // Split by backslash
      var parts = path.split('\\');
      if (parts.length <= keepParts + 1) return path; // No need to truncate

      // Keep drive letter (first part like "d:") and last keepParts
      var drive = parts[0] || '';
      var endParts = parts.slice(-keepParts);

      return drive + '\\...\\' + endParts.join('\\');
    }

    function showBubble(data) {
      // Only play sound for high priority bubbles (permission_request, ask_question)
      if (data.isHighPriority) {
        playChime();
      }
      document.getElementById('icon').textContent = ICONS[data.type] || 'ℹ️';
      // Add bell icon before type name for notification bubbles
      var typeName = TYPE_NAMES[data.type] || (data.type || 'Notification');
      if (data.type === 'notification' || data.type === 'user_prompt_submit' || data.type === 'pre_tool_use' || data.type === 'post_tool_use') {
        typeName = '🔔 ' + typeName;
      }
      document.getElementById('type').textContent = typeName;

      var msg = data.message || '';

      // Truncate long paths in message (e.g., "File: d:\...\folder\file.txt")
      var pathMatch = msg.match(/^(.*?:\s*)?([a-zA-Z]:\\[^:]+)$/);
      if (pathMatch) {
        var prefix = pathMatch[1] || '';
        var path = pathMatch[2];
        msg = prefix + truncatePath(path, 3);
      }

      // Also truncate very long messages
      if (msg.length > 120) msg = msg.substring(0, 120) + '...';

      document.getElementById('msg').textContent = msg;

      var bubble = document.getElementById('bubble');
      // Add priority class for styling (hides focus button for low priority)
      if (data.isLowPriority) {
        bubble.classList.add('low-priority');
        bubble.classList.remove('high-priority');
      } else if (data.isHighPriority) {
        bubble.classList.add('high-priority');
        bubble.classList.remove('low-priority');
      }

      bubble.style.animation = 'none';
      bubble.offsetHeight;
      bubble.style.animation = 'bubbleIn 0.25s ease-out';
    }
  </script>
</body>
</html>
