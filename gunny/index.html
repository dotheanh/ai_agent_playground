<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gunny-like Demo (100% Vibe Coding)</title>
    <style>
         :root {
            --bg: #07070a;
            --panel: #0f0f14;
            --text: #ffffff;
            --muted: #c9c9cf;
            --accent: #ff2d2d;
            --good: #ffffff;
            --bad: #ff2d2d;
        }
        
        * {
            box-sizing: border-box
        }
        
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
            background: radial-gradient(900px 600px at 15% 15%, rgba(255, 45, 45, .18), transparent 60%), var(--bg);
            color: var(--text)
        }
        
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 14px;
        }
        
        @media (max-width: 980px) {
            .wrap {
                grid-template-columns: 1fr;
            }
        }
        
        canvas {
            width: 100%;
            height: auto;
            background: var(--sky, linear-gradient(#060607, #14060a 60%, #0b0b0d));
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 14px;
        }
        
        .panel {
            background: rgba(0, 0, 0, .18);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 14px;
            padding: 14px;
        }
        
        h1 {
            font-size: 16px;
            margin: 0 0 6px
        }
        
        .sub {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4
        }
        
        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-top: 10px
        }
        
        input[type=range] {
            width: 100%
        }
        
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 10px
        }
        
        button {
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 45, 45, .18);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 700
        }
        
        button:hover {
            background: rgba(255, 45, 45, .28)
        }
        
        button:disabled {
            opacity: .5;
            cursor: not-allowed
        }
        
        .pill {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            font-size: 12px;
            color: var(--muted);
            text-decoration: none
        }

        .versions{
            margin-top:8px;
            max-height:92px;
            overflow:auto;
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            padding:6px;
            border-radius:12px;
            border:1px solid rgba(255,45,45,.18);
            background: rgba(0,0,0,.18);
        }.dot {
            width: 8px;
            height: 8px;
            border-radius: 50%
        }
        
        .dot.good {
            background: var(--good)
        }
        
        .dot.bad {
            background: var(--bad)
        }
        
        .log {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255,255,255,.92);
            background: rgba(0, 0, 0, .22);
            border: 1px dashed rgba(255, 45, 45, .22);
            border-radius: 12px;
            padding: 10px;
            min-height: 76px;
            white-space: pre-line
        }
        
        .small {
            font-size: 11px;
            color: var(--muted)
        }
    

        input[type=range]{width:100%; accent-color: var(--accent);}
        input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,45,45,.18);} 
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;margin-top:-6px;width:18px;height:18px;border-radius:50%;background:rgba(255,45,45,.95);border:2px solid rgba(255,255,255,.75);} 
        input[type=range]::-moz-range-track{height:6px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,45,45,.18);} 
        input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:rgba(255,45,45,.95);border:2px solid rgba(255,255,255,.75);}
</style>
</head>

<body>
    <div class="wrap">
        <div>
            <canvas id="c" width="900" height="520"></canvas>
        </div>
        <div class="panel">
            <h1>Gunny-like Demo (100% Vibe Coding)</h1>
            <div class="sub">PVE - Chỉnh góc/lực/gió → bắn - Địa hình đồi ngẫu nhiên - Sát thương mô phỏng theo động lực học rơi - Buff Phượng Hoàng - Responsive UI.</div>

            <div class="row">
                <span class="pill"><span class="dot good"></span> Bạn: <b id="hpP">100</b> HP</span>
                <span class="pill"><span class="dot bad"></span> Bot: <b id="hpB">100</b> HP</span>
            </div>

            <label>Góc bắn (<span id="angV">45</span>°)</label>
            <input id="ang" type="range" min="0" max="90" value="45" />

            <label>Lực bắn (<span id="powV">65</span>)</label>
            <input id="pow" type="range" min="10" max="100" value="65" />

            <label>Gió (m/s) (<span id="windV">0.0</span>)</label>
            <input id="wind" type="range" min="-30" max="30" value="0" />
            <div class="small">Gió tác động ngang lên đạn, thay đổi mỗi lượt.</div>

            <div class="row">
                <button id="moveL" style="min-width:56px;font-size:18px">←</button>
                <button id="shoot" style="flex:1">BẮN</button>
                <button id="moveR" style="min-width:56px;font-size:18px">→</button>
                <button id="reset">Reset</button>
            </div>

            <div class="log" id="log">Lượt của bạn. Chỉnh góc/lực rồi bắn.</div>

            <div class="row" style="margin-top:10px">
                <a class="pill" href="https://github.com/dotheanh/ai_agent_playground" target="_blank" style="display:flex;align-items:center;gap:6px">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="opacity:.9">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    GitHub
                </a>
            </div>
        </div>
    </div>

<script src="game-dev.js"></script>
</body>
</html>
